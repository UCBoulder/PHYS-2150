# --- Teaching assistants ---
# Loaded from tas.csv (one row per TA).
# Columns: first_name, last_name, email, section1, section2, section3
# Leave unused section columns empty. No quoting needed.
# Example:
#   first_name,last_name,email,section1,section2,section3
#   Alice,Smith,alice.smith@colorado.edu,102,107,
#   Bob,Jones,bob.jones@colorado.edu,103,108,

# --- Lab sections ---
# Loaded from sections.csv (one row per section).
# Columns: name, day, hour
# - name: Full Canvas section name (e.g. "PHYS 2150-102")
# - day: Day name (Tuesday, Thursday)
# - hour: Rounded start hour (10, 12, 14)
# Example:
#   name,day,hour
#   PHYS 2150-102,Tuesday,10
#   PHYS 2150-107,Thursday,10

