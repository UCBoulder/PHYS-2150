# =============================================================================
# Assignments
# =============================================================================
# PHYS 2150 does not use the PHYS 1140 "labs" structure (prelab/notebook/attendance).
# Instead, assignments are defined directly in categories below.
#
# Each assignment needs:
#   name              (str, required)  — exact Canvas name
#   group             (str, required)  — assignment group (must match assignment_groups)
#   points            (int, required)  — points possible
#   submission_types  (list, optional) — ["online_upload"], ["online_quiz"], ["none"]
#   allowed_extensions (list, optional) — e.g. ["pdf", "ipynb"]
#   due_date          (str, optional)  — ISO 8601 datetime
#   description       (str, optional)  — HTML description
# =============================================================================

special_assignments:
  # =========================================================================
  # Assessments/Surveys
  # =========================================================================
  # Assessment survey URLs are semester-specific Qualtrics links.
  # Update these URLs each semester.
  - name: "Pre-Course Survey"
    group: "Assessments/Surveys"
    points: 2
    submission_types: ["online_quiz"]
    due_date: "2026-01-16T23:00:00-07:00"  # Friday of Week 1
    no_banner: true
    description: >
      <p><span>Physics 2150 is an research experience where you will get to learn about experimental physics by engaging in actual experimental physics research!</span><br><br><span>This semester, we'll be working with perovskite solar cells fabricated at the National Laboratory of the Rockies (NLR). We will study the impact of environmental stressors on the external quantum efficiency of the solar cells to produce research results that will add to the scientific community's knowledge of perovskite solar cells. You will work collaboratively with your classmates, instructors, TAs, technical staff, and an outside science mentor to study a new class of photovoltaics (solar cells). You will participate in hands on work with the solar cells. Your group will be responsible for collecting and analyzing data to quantify the impact of the stressors on your solar cell using python and Google Colab.</span><br><br><span>Please answer the questions below so we can make sure to get you what you need to be successful in this course.</span></p>
    quiz_settings:
      quiz_type: "graded_survey"
      shuffle_answers: false
      time_limit: null
      allowed_attempts: 1
      show_correct_answers: false
      one_question_at_a_time: false

