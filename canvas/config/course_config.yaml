# =============================================================================
# Weekly Schedule
# =============================================================================
# PHYS 2150 uses a research-experience structure rather than structured labs.
# Each week has a custom checklist and assignment set.
#
# Fields per entry:
#   week        (int, required)  — 1-based week number
#   title       (str, optional)  — page title
#   note        (str, optional)  — note shown on week page
#   assignments (list, optional) — assignment names for the schedule page
#   checklist   (list, optional) — bullet items for checklist section
#   reminders   (list, optional) — bullet items for reminders section
#   lab_guide   (str, optional)  — lab guide filename or URL for this week
#   phase       (str, optional)  — research phase label (for display)
#
# Link placeholders (resolved at render time):
#   {{assignment:Name}}         — links to a Canvas assignment/quiz
#   {{page:Title}}              — links to a Canvas wiki page
#   {{page:Title|display text}} — links with custom display text
# =============================================================================

schedule:
  - week: 1
    title: "Welcome to PHYS 2150"
    note: "There are no lab sessions this week."
    phase: "Introduction"
    checklist:
      - "Read the syllabus."
      - "Attend the first lecture &mdash; Duane, Room G1B20. <strong>Bring your iClicker.</strong>"
      - "Familiarize yourself with the course Canvas page."
      - "Complete the {{assignment:Pre-Course Survey}}."

  - week: 2
    title: "Teamwork & Lab Orientation"
    phase: "Introduction"
    lab_guide: "LabGuide-Week2.pdf"
    checklist:
      - "Read through the Lab Guide before the lab session."
      - "Attend your assigned lab section."
      - "Attend lecture."
      - "Submit {{assignment:Teamwork Strategies}} assignment."
      - "Complete the {{assignment:Pre-Course Survey}}, {{assignment:Assessment Survey 1 (Pre)}}, and {{assignment:Assessment Survey 2 (Pre)}}."
      - "Complete {{assignment:Reflection Questions: Week 2}}."
      - "Complete the reading assignments in preparation for Week 3."
    assignments:
      - "Teamwork Strategies"
      - "Pre-Course Survey"
      - "Assessment Survey 1 (Pre)"
      - "Assessment Survey 2 (Pre)"
      - "Reflection Questions: Week 2"

  - week: 3
    title: "Apparatus Introduction"
    phase: "Introduction"
    lab_guide: "LabGuide-Week3.pdf"
    checklist:
      - "Read through the Lab Guide before the lab session."
      - "Attend your assigned lab section."
      - "Attend lecture."
      - "Submit {{assignment:Questions for PI}}."
      - "Submit {{assignment:Colab Tutorial Notebook}} (.ipynb and PDF)."
      - "Complete {{assignment:Reflection Questions: Week 3}}."
    assignments:
      - "Questions for PI"
      - "Colab Tutorial Notebook"
      - "Reflection Questions: Week 3"

  - week: 4
    title: "Apparatus Training"
    phase: "Training"
    lab_guide: "LabGuide-Week4.pdf"
    checklist:
      - "Read through the Lab Guide before the lab session."
      - "Attend your assigned lab section."
      - "Attend lecture."
      - "Complete {{assignment:Apparatus Walkthrough}}."
      - "Submit {{assignment:Data Management Plan}}."
      - "Submit {{assignment:Baseline Measurement Colab Notebook 1}} (.ipynb and PDF)."
      - "Complete {{assignment:Reflection Questions: Week 4}}."
    assignments:
      - "Apparatus Walkthrough"
      - "Data Management Plan"
      - "Baseline Measurement Colab Notebook 1"
      - "Reflection Questions: Week 4"

  - week: 5
    title: "Baseline Measurements"
    phase: "Baseline"
    lab_guide: "LabGuide-Week5.pdf"
    checklist:
      - "Read through the Lab Guide before going to lab."
      - "Attend your assigned lab section."
      - "Attend the lecture."
      - "Submit {{assignment:Baseline Measurement Colab Notebook 2}} (.ipynb and PDF)."
      - "<strong>If you worked with the J-V apparatus this week</strong>, submit {{assignment:Stressor LED Spectrum Colab Notebook}} (.ipynb and PDF)."
