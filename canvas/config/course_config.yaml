# =============================================================================
# PHYS 2150 — Canvas Course Configuration
# =============================================================================
# This file drives canvas_setup_course.py to create/update all Canvas course
# structure: assignment groups, assignments, quizzes, styled wiki pages, and
# per-section due date overrides.
# =============================================================================

# --- Canvas connection ---
canvas:
  domain: canvas.colorado.edu
  # Sandbox for testing — change to real course ID for production
  course_id: 86214

# --- Page release schedule ---
# Controls when each week's page becomes available to students.
# Relative to the Monday that starts each week.
# Example: days_before: 3, hour: 20 = Friday at 8 PM before the week starts
page_release:
  days_before: 3   # 3 = Friday, 2 = Saturday, 1 = Sunday, 0 = Monday
  hour: 20         # 24h format, in term timezone

# --- Term info ---
term:
  name: "Spring 2026"
  start: "2026-01-12"       # Monday of Week 1
  timezone: "America/Denver"

# --- Lab guide URLs ---
# Placeholder for future external website hosting lab guides, notebooks, etc.
# Update these URLs once the website is launched.
lab_guides:
  base_url: "https://example.com/phys2150/labs"  # TODO: Update when website launches

# --- External content URLs ---
# Placeholder links for content that will be served from the lab website.
# These are used in week page templates and can be updated per-semester.
external_links:
  colab_tutorial: "https://example.com/phys2150/notebooks/tutorial"  # TODO
  jv_apparatus_guide: "https://example.com/phys2150/guides/jv-apparatus"  # TODO
