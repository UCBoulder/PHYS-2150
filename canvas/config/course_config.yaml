# --- Lecture schedule ---
# PHYS 2150 has weekly lectures (Wednesdays, 1:25-2:15 PM, Duane G1B20).
# Update weeks and topics each semester.
lectures:
  - { number: 1, week: 1, topic: "Introduction" }
  - { number: 2, week: 2, topic: "Teamwork & Lab Intro" }
  - { number: 3, week: 3, topic: "Solar Cells & Photovoltaics" }
